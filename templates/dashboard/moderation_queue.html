{% extends "base.html" %}

{% block title %}Согласование | RoomFlow{% endblock %}

{% block content %}
  <div class="content-card">
    <div class="d-flex justify-content-between align-items-end mb-4">
      <div>
        <span class="eyebrow">Модерация</span>
        <h1 class="h3 mb-0">Очередь заявок на согласование</h1>
      </div>
      <span class="badge status-pending px-3 py-2" id="moderation-count">{{ bookings|length }} в очереди</span>
    </div>
    <div id="moderation-alert"></div>
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead>
          <tr>
            <th>Тема</th>
            <th>Комната</th>
            <th>Организатор</th>
            <th>Интервал</th>
            <th>Комментарий</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="moderation-body"></tbody>
      </table>
    </div>
  </div>
{% endblock %}

{% block extra_scripts %}
  <script>
    (() => {
      const body = document.getElementById("moderation-body");
      const count = document.getElementById("moderation-count");
      const alertBox = document.getElementById("moderation-alert");
      const { request, escapeHtml, formatDateTime, clearAlert, showAlert } = window.RoomFlowApi;

      function renderRows(bookings) {
        count.textContent = `${bookings.length} в очереди`;
        if (!bookings.length) {
          body.innerHTML = '<tr><td colspan="6" class="text-secondary">В очереди нет заявок.</td></tr>';
          return;
        }
        body.innerHTML = bookings.map((booking) => `
          <tr data-booking-id="${booking.id}">
            <td><a href="/bookings/${booking.id}/" class="table-link">${escapeHtml(booking.title)}</a></td>
            <td>${escapeHtml(booking.room.name)}</td>
            <td>${escapeHtml(booking.organizer.full_name || booking.organizer.username)}</td>
            <td>${formatDateTime(booking.start_at)} — ${formatDateTime(booking.end_at)}</td>
            <td>
              <form class="d-grid gap-2 moderation-form">
                <textarea name="comment" class="form-control" rows="2" placeholder="Комментарий модератора"></textarea>
                <div class="d-flex gap-2">
                  <button type="submit" data-decision="approve" class="btn btn-sm btn-warning">Подтвердить</button>
                  <button type="button" data-decision="reject" class="btn btn-sm btn-outline-danger">Отклонить</button>
                </div>
              </form>
            </td>
            <td></td>
          </tr>
        `).join("");

        body.querySelectorAll(".moderation-form").forEach((form) => {
          const row = form.closest("tr");
          const bookingId = row.dataset.bookingId;
          const buttons = form.querySelectorAll("[data-decision]");
          buttons.forEach((button) => {
            button.addEventListener("click", async (event) => {
              event.preventDefault();
              const decision = button.dataset.decision;
              try {
                await request(`/api/bookings/${bookingId}/${decision}/`, {
                  method: "POST",
                  body: JSON.stringify({ comment: form.elements.comment.value }),
                });
                await loadQueue();
              } catch (error) {
                showAlert(alertBox, "danger", error.message);
              }
            });
          });
        });
      }

      async function loadQueue() {
        clearAlert(alertBox);
        const bookings = await request("/api/bookings/pending/");
        renderRows(bookings);
      }

      loadQueue().catch((error) => {
        body.innerHTML = "";
        showAlert(alertBox, "danger", error.message);
      });
    })();
  </script>
{% endblock %}
