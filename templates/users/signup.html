{% extends "base.html" %}

{% block title %}Регистрация | RoomFlow{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-xl-7">
      <div class="content-card">
        <span class="eyebrow">Новый аккаунт</span>
        <h1 class="h3 mb-4">Регистрация в RoomFlow</h1>
        <form method="post" class="row g-3">
          {% csrf_token %}
          {% for field in form %}
            <div class="col-md-6{% if field.name == 'email' %} col-md-12{% endif %}">
              <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
              {% endif %}
            </div>
          {% endfor %}
          <div class="col-12">
            <button type="submit" class="btn btn-warning">Создать аккаунт</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
