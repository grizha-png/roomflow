services:
  db:
    image: postgres:17-alpine
    container_name: roomflow-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roomflow}
      POSTGRES_USER: ${POSTGRES_USER:-roomflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roomflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roomflow} -d ${POSTGRES_DB:-roomflow}"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: roomflow-web
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

